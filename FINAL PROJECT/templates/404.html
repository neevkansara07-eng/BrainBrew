{# 404 page: shown when a route/page doesn't exist (friendly error screen). #}
{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="glass-panel text-center p-5" style="max-width: 600px;">
        
        <div class="mb-4 position-relative">
            <i class="fas fa-user-astronaut text-white" style="font-size: 8rem; animation: floatError 6s ease-in-out infinite;"></i>
            <i class="fas fa-question position-absolute text-danger" style="font-size: 3rem; top: 0; right: 25%; animation: pulse 2s infinite;"></i>
        </div>

        <h1 class="display-1 fw-bold text-gradient">404</h1>
        <h3 class="text-white fw-bold">Signal Lost</h3>
        <p class="text-muted mb-4">The coordinates you entered point to an empty void. Let's get you back to base.</p>

        <a href="{{ url_for('dashboard') }}" class="btn btn-glow px-5">
            <i class="fas fa-radar me-2"></i> Return to Command
        </a>
    </div>
</div>

<style>
    @keyframes floatError {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-20px) rotate(10deg); }
    }
    @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.5; }
        100% { opacity: 1; }
    }
</style>
{% endblock %}
